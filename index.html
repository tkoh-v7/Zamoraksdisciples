<!DOCTYPE html>
<html>
<body>

<h1>Clan Board</h1>

<input id="name" placeholder="Name"><br>
<textarea id="msg" placeholder="Message"></textarea><br>
<button onclick="post()">Post</button>

<h2>Messages</h2>
<div id="feed"></div>

<script>
const API = "https://damp-mud-ecd0.r-2007scaper.workers.dev";

async function post() {
  await fetch(API + "/api/clan/message", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: name.value,
      message: msg.value
    })
  });

  load();
}

async function load() {
  const res = await fetch(API + "/api/clan/messages");
  const data = await res.json();

  feed.innerHTML = data.map(x =>
    `<p><b>${x.name}</b>: ${x.message}</p>`
  ).join("");
}

load();
</script>

</body>
</html>
