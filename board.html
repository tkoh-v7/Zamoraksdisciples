<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Message Board — Disciples of Zamorak</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="sigil"></div>
    <div>
      <div class="clan-name">Disciples of Zamorak</div>
      <div class="clan-sub">Castle Wars Clan · Est. Gielinor</div>
    </div>
    <div class="header-right">
      <a class="header-discord" href="https://discord.gg/" target="_blank">⚔ Discord</a>
    </div>
  </header>

  <nav class="site-nav">
    <div class="nav-section-label">Navigation</div>
    <a href="index.html"><span class="nav-icon">🏰</span> Home</a>
    <a href="board.html" class="active"><span class="nav-icon">📜</span> Message Board</a>
    <a href="members.html"><span class="nav-icon">⚔</span> Members</a>
    <a href="apply.html"><span class="nav-icon">🩸</span> Apply</a>
    <hr class="nav-divider">
    <div class="nav-section-label">Admin</div>
    <a href="admin.html"><span class="nav-icon">🔱</span> Admin Panel</a>
  </nav>

  <main class="site-main">
    <div class="page-header">
      <h1>Message <span>Board</span></h1>
      <p>Leave word for your brothers. All disciples may post.</p>
    </div>

    <div class="grid-2" style="align-items:start;">

      <!-- Post form -->
      <section class="card">
        <div class="card-title">Post a Message</div>
        <div class="form-group">
          <label for="boardName">Your Name / RSN</label>
          <input type="text" id="boardName" maxlength="24" placeholder="RuneScape name">
        </div>
        <div class="form-group">
          <label for="boardMessage">Message</label>
          <textarea id="boardMessage" maxlength="500" placeholder="Write your message here..."></textarea>
        </div>
        <!-- Honeypot -->
        <input id="boardWebsite" class="hidden" tabindex="-1" autocomplete="off" placeholder="Leave blank">
        <button class="btn btn-primary" id="postBtn" onclick="submitClanMessage()">Post Message</button>
        <div id="boardStatus"></div>
      </section>

      <!-- Feed -->
      <section>
        <div class="card-title" style="margin-bottom:10px;">Messages</div>
        <div id="boardFeed">
          <p class="muted small">Loading messages...</p>
        </div>
      </section>

    </div>
  </main>

  <script src="clan.js"></script>
  <script>
    loadClanMessages();
  </script>
</body>
</html>
